services:
  - type: web
    name: circlemanage-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: FIXSTARS_API_KEY
        sync: false
      - key: NAVITIME_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
